# Canonical yeastbench run.
#
# This file is the single source of truth for the numbers we report in
# the paper / README. Change anything here → cut a new config version.
#
# Invocation:
#   uv run ybench run --config configs/default.yaml
#
# Filters:
#   uv run ybench run --config configs/default.yaml --model shorkie
#   uv run ybench run --config configs/default.yaml --task  caudal_eqtl
#
# Dry-run (show what would execute, do nothing):
#   uv run ybench run --config configs/default.yaml --dry-run

out_dir: results/default
device: cuda

tasks_config:
  caudal_eqtl:
    distribution_dir: data/tasks/caudal_eqtl
    fasta_path: data/tasks/R64-1-1.fa
    gtf_path: data/tasks/R64-1-1.115.gtf
  kita_eqtl:
    distribution_dir: data/tasks/kita_eqtl
    fasta_path: data/tasks/R64-1-1.fa
    gtf_path: data/tasks/R64-1-1.115.gtf
  rafi_mpra_marginalized:
    data_dir: data/tasks/rafi_mpra
    fasta_path: data/tasks/R64-1-1.fa
    gtf_path: data/tasks/R64-1-1.115.gtf
  shalem_mpra_marginalized:
    data_path: data/tasks/shalem_mpra_terminator/segal_2015.tsv
    fasta_path: data/tasks/R64-1-1.fa
    gtf_path: data/tasks/R64-1-1.115.gtf
  wu_rfpins:
    cassette_seq: data/tasks/wu_rfpins/expression_cassette.fasta
    labels_path: data/tasks/wu_rfpins/table_s2_fluorescence_1044_loci.csv
    fasta_path: data/tasks/R64-1-1.fa
    gtf_path: data/tasks/R64-1-1.115.gtf
  chen_gfp_r1:
    library: gfp_r1
    data_path: data/tasks/chen_synonymous/gfp_r1.tsv
    fasta_path: data/tasks/chen_synonymous/construct_chrII_gfp.fa
    gtf_path: data/tasks/chen_synonymous/construct_gfp.gtf
    library_loci_path: data/tasks/chen_synonymous/library_loci.json
    replicate_ceiling_pearson: 0.83
  chen_gfp_r2:
    library: gfp_r2
    data_path: data/tasks/chen_synonymous/gfp_r2.tsv
    fasta_path: data/tasks/chen_synonymous/construct_chrII_gfp.fa
    gtf_path: data/tasks/chen_synonymous/construct_gfp.gtf
    library_loci_path: data/tasks/chen_synonymous/library_loci.json
    replicate_ceiling_pearson: 0.73
  chen_tdh3:
    library: tdh3
    data_path: data/tasks/chen_synonymous/tdh3.tsv
    fasta_path: data/tasks/chen_synonymous/construct_chrII_tdh3.fa
    gtf_path: data/tasks/chen_synonymous/construct_tdh3.gtf
    library_loci_path: data/tasks/chen_synonymous/library_loci.json
    replicate_ceiling_pearson: 0.72

runs:
  - model: shorkie
    tasks:
      [
        caudal_eqtl,
        kita_eqtl,
        rafi_mpra_marginalized,
        shalem_mpra_marginalized,
        wu_rfpins,
        chen_gfp_r1,
        chen_gfp_r2,
        chen_tdh3,
      ]
    model_config:
      params_path: data/models/shorkie/params.json
      checkpoint_paths:
        - data/models/shorkie/checkpoints/f0.h5
        - data/models/shorkie/checkpoints/f1.h5
        - data/models/shorkie/checkpoints/f2.h5
        - data/models/shorkie/checkpoints/f3.h5
        - data/models/shorkie/checkpoints/f4.h5
        - data/models/shorkie/checkpoints/f5.h5
        - data/models/shorkie/checkpoints/f6.h5
        - data/models/shorkie/checkpoints/f7.h5
      batch_size: 32
      use_rc: true

  - model: yorzoi
    tasks:
      [
        caudal_eqtl,
        kita_eqtl,
        rafi_mpra_marginalized,
        shalem_mpra_marginalized,
        wu_rfpins,
        chen_gfp_r1,
        chen_gfp_r2,
        chen_tdh3,
      ]
    model_config:
      hf_repo: tom-ellis-lab/yorzoi
      batch_size: 64
      use_rc: true

  - model: cai
    tasks: [chen_gfp_r1, chen_gfp_r2, chen_tdh3]
    model_config: {}

  - model: codon_transformer
    tasks: [chen_gfp_r1, chen_gfp_r2, chen_tdh3]
    model_config: {}
